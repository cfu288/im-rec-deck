# IMRecDeck — Manifest
#
# Source of truth for `references/guidelines/`. The generator reads this and
# produces the OKF bundle. NEVER edit files under `references/` by hand —
# edit this manifest and regenerate.
#
# Schema:
#   systems.<slug>.title              # display name
#   systems.<slug>.description        # optional one-liner
#   systems.<slug>.topics.<slug>:     # one entry per condition
#     title:                          # condition display name
#     society:                        # default issuing body (overridable per version)
#     versions:                       # list, most recent first
#       - year:                       # integer; OMIT for living / non-versioned docs
#         society:                    # overrides topic-level society if different
#         title:                      # full guideline name
#         notes:                      # free-text carried from the original index
#         source:                     # OPTIONAL: format-keyed map (see below)
#           <format>:                 #   format = pdf | epub | html | xml | docx | ...
#             url:                    #     OPTIONAL: publisher URL for THIS format
#             local:                  #     OPTIONAL: bundle-relative path once downloaded
#         url:                        # OPTIONAL: canonical reference URL (DOI / landing page)
#         pmid:                       # OPTIONAL: PubMed ID (string) when known
#
#   study_guides:                     # cross-cutting curated lists
#     <slug>:
#       title:
#       description:
#       entries:                      # list of links to topics
#         - label:
#           topic:                    # /<system>/<topic>/
#
# Implicit rules:
#   - Latest `year` per topic = current. Other year entries = superseded.
#   - An entry without `year` is a living / non-versioned guideline.
#   - The ⭐ "recently updated" convention has been dropped — `year` carries it.

