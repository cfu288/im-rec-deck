title: IMRecDeck
description: System-by-system index of current society guidelines for internal medicine practice.

# just-the-docs delivered via remote_theme (no Gemfile needed on GH Pages).
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# baseurl is for GH Pages project sites (https://<user>.github.io/<repo>/).
# Override to "" for root-domain hosting (CNAME / user pages):
#   jekyll serve --baseurl ""
# All internal links are emitted via {{ ... | relative_url }} so they work either way.
baseurl: "/im-rec-deck"
url: "https://cfu288.github.io"

markdown: kramdown

# just-the-docs settings
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
heading_anchors: true

# Header-right auxiliary links — replaces the cayman-override "Download Anki Deck" button.
aux_links:
  "Download Anki Deck":
    - "https://github.com/cfu288/im-rec-deck/raw/main/build/im-rec-deck.apkg"
aux_links_new_tab: false

# Show the "Edit this page on GitHub" footer link
gh_edit_link: true
gh_edit_link_text: "View source on GitHub"
gh_edit_repository: "https://github.com/cfu288/im-rec-deck"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Footer content
footer_content: 'IMRecDeck · <a href="https://github.com/cfu288/im-rec-deck">source</a>'

exclude:
  - README.md
